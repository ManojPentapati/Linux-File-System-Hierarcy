<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux FS Tree - Interactive Visualizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>LINUX FILE SYSTEM HIERARCHY</h1>
    <p>TOP-DOWN TREE · CLICK ANY NODE TO SEE DETAILS</p>
  </header>

  <!-- Stats Bar -->
  <div id="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">DIRECTORIES</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:#ff6b9d" id="stat-root-only">0</div>
      <div class="stat-label">ROOT ONLY</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:#00ff88" id="stat-user">0</div>
      <div class="stat-label">USER ACCESS</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:#ffd700" id="stat-virtual">0</div>
      <div class="stat-label">VIRTUAL FS</div>
    </div>
  </div>

  <!-- Search Bar -->
  <div id="search-container">
    <div id="search-wrap">
      <span id="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search directories... (e.g. logs, config, kernel)" autocomplete="off"/>
      <button id="search-clear" onclick="clearSearch()" style="display:none">✕</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Breadcrumb -->
  <div id="breadcrumb">
    <span id="breadcrumb-text">/ root</span>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button onclick="expandAll()">▼ EXPAND ALL</button>
    <button onclick="collapseAll()">▲ COLLAPSE ALL</button>
    <button onclick="resetZoom()">⌂ RESET VIEW</button>
    <button id="quiz-btn" onclick="startQuiz()">🎯 QUIZ MODE</button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="leg" onclick="filterByCategory('user')" style="cursor:pointer">
      <div class="leg-dot" style="background:#00ff88"></div> User Space
    </div>
    <div class="leg" onclick="filterByCategory('system')" style="cursor:pointer">
      <div class="leg-dot" style="background:#00d4ff"></div> System
    </div>
    <div class="leg" onclick="filterByCategory('config')" style="cursor:pointer">
      <div class="leg-dot" style="background:#ffd700"></div> Config
    </div>
    <div class="leg" onclick="filterByCategory('devices')" style="cursor:pointer">
      <div class="leg-dot" style="background:#ff8c42"></div> Devices
    </div>
    <div class="leg" onclick="filterByCategory('virtual')" style="cursor:pointer">
      <div class="leg-dot" style="background:#ff6b9d"></div> Virtual FS
    </div>
    <div class="leg" onclick="filterByCategory(null)" style="cursor:pointer">
      <div class="leg-dot" style="background:#5a7a9a"></div> Show All
    </div>
  </div>

  <!-- SVG -->
  <div id="svg-container"></div>

  <!-- Side Panel -->
  <div id="panel">
    <button id="panel-close" onclick="closePanel()">✕</button>
    <div id="panel-content"></div>
  </div>

  <!-- Quiz Modal -->
  <div id="quiz-overlay">
    <div id="quiz-modal">
      <div id="quiz-header">
        <span id="quiz-title">🎯 LINUX FS QUIZ</span>
        <button id="quiz-exit" onclick="exitQuiz()">✕ EXIT</button>
      </div>
      <div id="quiz-progress-bar"><div id="quiz-progress-fill"></div></div>
      <div id="quiz-score-row">
        <span>Score: <span id="quiz-score">0</span></span>
        <span>Q <span id="quiz-qnum">1</span> / <span id="quiz-total">0</span></span>
        <span>🔥 Streak: <span id="quiz-streak">0</span></span>
      </div>
      <div id="quiz-question"></div>
      <div id="quiz-options"></div>
      <div id="quiz-feedback"></div>
      <button id="quiz-next" onclick="nextQuestion()" style="display:none">NEXT →</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
